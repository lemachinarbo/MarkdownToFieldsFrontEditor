name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.CI_TOKEN }}

  upload-assets:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build frontend bundle
        run: npm run build

      - name: Prepare release artifact (zip)
        run: |
          set -euo pipefail
          VERSION="${{ needs.release-please.outputs.tag_name }}"
          RELEASE_NAME="MarkdownToFieldsFrontEditor-${VERSION}"
          RELEASE_DIR="${RELEASE_NAME}"

          mkdir -p "$RELEASE_DIR"

          rsync -av \
            --exclude "docs/video.mp4" \
            MarkdownToFieldsFrontEditor.module.php \
            README.md \
            assets \
            dist \
            docs \
            "$RELEASE_DIR/"

          zip -r "${RELEASE_NAME}.zip" "$RELEASE_DIR"

          # Clean up temp dir
          rm -rf "$RELEASE_DIR"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: MarkdownToFieldsFrontEditor-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.CI_TOKEN }}
